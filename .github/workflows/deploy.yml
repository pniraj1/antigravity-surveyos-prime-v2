name: Build & Deploy to Firebase

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: surveyos-v2-antigravity.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: surveyos-v2-antigravity
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: surveyos-v2-antigravity.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '926682149516'
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:926682149516:web:7a4b8de9b48e2ebf4dc1a9
          NEXT_PUBLIC_GOOGLE_DRIVE_CLIENT_ID: 926682149516-eqq2j1eah869ng6ohlcpn3g54d8dibot.apps.googleusercontent.com
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: surveyos-v2-antigravity.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: surveyos-v2-antigravity
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: surveyos-v2-antigravity.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '926682149516'
          NEXT_PUBLIC_FIREBASE_APP_ID: 1:926682149516:web:7a4b8de9b48e2ebf4dc1a9
          NEXT_PUBLIC_GOOGLE_DRIVE_CLIENT_ID: 926682149516-eqq2j1eah869ng6ohlcpn3g54d8dibot.apps.googleusercontent.com
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: surveyos-v2-antigravity
